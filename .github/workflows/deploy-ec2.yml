name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    concurrency:
      group: deploy-ec2
      cancel-in-progress: true
    steps:
      - name: Resolve app directory
        id: config
        run: |
          set -euo pipefail

          APP_DIR="${{ vars.EC2_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="/home/ubuntu/clipity-clips-main"
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "App repo not found at $APP_DIR"
            exit 1
          fi

          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy on self-hosted runner
        run: |
          set -euo pipefail
          export APP_DIR="${{ steps.config.outputs.app_dir }}"
          export PATH="$HOME/.bun/bin:$PATH"

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          bash scripts/deploy-ec2.sh

      - name: Show deployed commit
        run: |
          set -euo pipefail
          cd "${{ steps.config.outputs.app_dir }}"
          git rev-parse --short HEAD
